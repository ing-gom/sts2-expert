name = "sts2-expert-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# 사이트 출처만 허용하려면 GitHub Pages origin 으로 좁힌다.
# 커스텀 도메인을 쓰면 그 origin 으로 바꾸고, 전체 허용은 "*".
[vars]
ALLOW_ORIGIN = "https://ing-gom.github.io"

# D1 바인딩 — `wrangler d1 create sts2_expert_votes` 후 출력된 database_id 를 채운다.
[[d1_databases]]
binding = "DB"
database_name = "sts2_expert_votes"
database_id = "REPLACE_WITH_d1_create_OUTPUT"

# TURNSTILE_SECRET 은 vars 가 아니라 secret 으로:
#   wrangler secret put TURNSTILE_SECRET
# 미설정 시 Worker 는 캡차 검증을 건너뛴다(개발/무캡차).
